<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPC Automation — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./web/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="top-bar">
        <div class="top-bar-left">
          <span class="brand">PPC Automation</span>
          <span class="top-bar-sep">|</span>
          <span class="top-bar-muted">Demo · mock data · read-only</span>
        </div>
        <div class="top-bar-right">
          <div id="status-pill" class="status-pill ok">
            <span class="dot"></span>
            <span id="status" class="status-text">Připraveno ke spuštění</span>
          </div>
        </div>
      </header>

      <div class="toolbar toolbar-global">
        <button id="run-demo" type="button" class="run-btn">Spustit denní běh</button>
        <a class="toolbar-link" href="https://honzabrzak.cz/jak-pracuji" target="_blank" rel="noopener">
          Jak pracuji
        </a>
        <a
          class="toolbar-link"
          href="https://github.com/HonzaBBB/ppc-automations-demo"
          target="_blank"
          rel="noopener"
        >
          GitHub
        </a>
      </div>

      <section id="summary" class="kpis hidden" aria-label="Shrnutí"></section>

      <main id="report" class="report-layout hidden" aria-label="Výstup dema"></main>

      <p class="app-footer">
        Demo verze — prahové hodnoty per klient a workflow s výstupy nejsou součástí repozitáře.
      </p>
    </div>

    <script type="module" src="./web/app.js"></script>
  </body>
</html>
