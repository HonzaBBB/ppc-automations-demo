<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPC Automation Demo</title>
    <link rel="stylesheet" href="./web/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <p class="eyebrow">Transparentní monitoring Google Ads</p>
        <h1>PPC Automation Demo</h1>
        <p class="lead">
          Simulace denního běhu nad fiktivními účty — stejná logika kontrol jako v produkci,
          bez API klíčů a bez reálných dat.
        </p>
        <div class="actions">
          <button id="run-demo" type="button" class="btn-primary">Spustit demo</button>
          <a class="btn-secondary" href="https://honzabrzak.cz/jak-pracuji" target="_blank" rel="noopener">
            Jak pracuji
          </a>
          <a class="btn-secondary" href="https://github.com/HonzaBBB/ppc-automations-demo" target="_blank" rel="noopener">
            GitHub repo
          </a>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
      </div>
    </header>

    <main class="container">
      <section id="summary" class="summary hidden" aria-label="Shrnutí"></section>
      <article id="report" class="report hidden" aria-label="Report"></article>
    </main>

    <footer class="footer container">
      <p>
        Demo verze — know-how je v prahových hodnotách per klient a každodenní práci s výstupy.
      </p>
    </footer>

    <script type="module" src="./web/app.js"></script>
  </body>
</html>
